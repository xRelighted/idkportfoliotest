<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Relighted — Animator</title>
<link rel="icon" href="/favicon.jpg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0A0C0F;
  --panel:#111417;
  --muted:#A0AEC0;
  --accent:#9AA5B1;
  --text:#F0F4FA;
  --glass: rgba(17,20,23,0.45);
  --radius:16px;
  --ease:cubic-bezier(.19,1,.22,1);
  --container:1200px;
}

/* RESET */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Inter,system-ui;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* BACKGROUND GLOW */
.bg-layer{position:fixed;inset:0;z-index:-3;background:var(--bg)}
.sphere{
  position:fixed;
  border-radius:50%;
  filter:blur(90px);
  pointer-events:none;
}
.sphere.one{
  width:70vw;height:70vw;
  right:-20vw;top:-25vw;
  background:radial-gradient(circle,rgba(154,165,177,.18),transparent 60%);
}
.sphere.two{
  width:60vw;height:60vw;
  left:-20vw;bottom:-25vw;
  background:radial-gradient(circle,rgba(60,70,90,.22),transparent 60%);
}

.wrap{max-width:var(--container);margin:auto;padding:3rem 1.5rem}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:flex-end;
  margin-bottom:3rem;
}

.nav-right{
  display:flex;
  gap:.8rem;
}

.top-icon{
  width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;
  border-radius:14px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  backdrop-filter:blur(8px);
  transition:.35s var(--ease);
  text-decoration:none;
  color:var(--text);
}

.top-icon:hover{
  transform:translateY(-6px) scale(1.08);
}

.youtube-icon{
  color:#ff2d2d;
}

.youtube-icon:hover{
  box-shadow:0 0 30px rgba(255,45,45,.4);
}

.secret-icon{
  font-weight:700;
  color:var(--accent);
}

/* HERO */
.hero{
  display:grid;
  grid-template-columns:1fr 520px;
  gap:3rem;
  align-items:center;
}

@media(max-width:980px){
  .hero{grid-template-columns:1fr}
}

h1{
  font-size:clamp(2rem,5vw,3.8rem);
  font-weight:300;
  background:linear-gradient(135deg,var(--text),var(--muted));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  color:var(--muted);
  margin:1rem 0 1.4rem;
  max-width:45ch;
}

/* PROFILE */
.profile-wrap{
  position:relative;
  border-radius:22px;
  overflow:hidden;
  background:#0e1116;
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 40px 80px -30px rgba(0,0,0,.8);
  transition:.6s var(--ease);
  transform-style:preserve-3d;
}

.profile-img{
  width:100%;
  transition:.8s var(--ease);
}

.profile-glow{
  position:absolute;
  inset:-60%;
  background:radial-gradient(circle,
    rgba(154,165,177,.35),
    rgba(154,165,177,.15),
    transparent 60%);
  animation:spin 12s linear infinite;
  mix-blend-mode:screen;
  pointer-events:none;
}

@keyframes spin{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1.4rem;
  margin-top:4rem;
}

@media(max-width:980px){
  .cards{grid-template-columns:1fr}
}

.card{
  background:var(--panel);
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.05);
  transition:.5s var(--ease);
  position:relative;
}

.card::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.1),transparent);
  transform:translateX(-100%);
}

.card:hover::after{
  animation:shine 1.4s;
}

@keyframes shine{
  100%{transform:translateX(100%)}
}

.card:hover{
  transform:translateY(-12px);
  box-shadow:0 40px 80px -30px rgba(0,0,0,.9);
}

.thumb{position:relative;padding-bottom:56%;background:#000}
.thumb iframe{position:absolute;inset:0;width:100%;height:100%;border:0}

/* SECTION */
.section-title{
  text-align:center;
  margin-top:4rem;
}

.section-title h2{
  font-weight:300;
  background:linear-gradient(135deg,var(--accent),var(--muted));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
</style>
</head>

<body>

<div class="bg-layer"></div>
<div class="sphere one"></div>
<div class="sphere two"></div>

<div class="wrap">

<div class="topbar">
  <div class="nav-right">
    <a href="https://www.youtube.com/@xRelighted" target="_blank" class="top-icon youtube-icon">
      ▶
    </a>
    <a href="/secret" class="top-icon secret-icon">?</a>
  </div>
</div>

<section class="hero">
  <div>
    <h1>Relighted</h1>
    <div class="subtitle">
      Young Roblox Studio animator using Blender to deliver cinematic quality and efficiency.
    </div>
  </div>

  <div class="profile-wrap" id="profile3d">
    <div class="profile-glow"></div>
    <img class="profile-img" src="https://i.imgur.com/pvvtE36.png">
  </div>
</section>

<div class="section-title">
  <h2>Featured Work</h2>
</div>

<div class="cards">
  <div class="card">
    <div class="thumb">
      <iframe src="https://www.youtube.com/embed/kR0Cv6524mM"></iframe>
    </div>
  </div>
  <div class="card">
    <div class="thumb">
      <iframe src="https://www.youtube.com/embed/TB9BlAUvUa8"></iframe>
    </div>
  </div>
  <div class="card">
    <div class="thumb">
      <iframe src="https://www.youtube.com/embed/3zpqruFkSgU"></iframe>
    </div>
  </div>
</div>

</div>

<script>
/* 3D hover real */
const profile = document.getElementById("profile3d");

profile.addEventListener("mousemove", e=>{
  const rect = profile.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width - .5;
  const y = (e.clientY - rect.top) / rect.height - .5;
  profile.style.transform =
    `rotateY(${x*12}deg) rotateX(${-y*12}deg) scale(1.03)`;
});

profile.addEventListener("mouseleave", ()=>{
  profile.style.transform="rotateY(0) rotateX(0) scale(1)";
});
</script>

</body>
</html>
